      <text x="150" y="336" fill="#222">appointments</text>
      <text x="150" y="382" fill="#222">medical_certificates</text>
      <text x="150" y="428" fill="#222">medicines</text>
      <text x="150" y="474" fill="#222">patients</text>
      <text x="150" y="520" fill="#222">prescriptions</text>
      <text x="150" y="566" fill="#222">users</text>
    </g>

    <g fill="#ffffff" stroke="#c8c8c3">
      <rect x="376" y="181" width="132" height="36"/>
      <rect x="516" y="181" width="92" height="36"/>
      <rect x="616" y="181" width="116" height="36"/>
      <rect x="740" y="181" width="102" height="36"/>
      <rect x="850" y="181" width="116" height="36"/>
      <rect x="974" y="181" width="116" height="36"/>
      <rect x="1098" y="181" width="142" height="36"/>
