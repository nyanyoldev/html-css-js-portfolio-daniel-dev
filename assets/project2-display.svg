          <text x="330" y="130">Browse  Structure  Insert</text>
          <text x="330" y="178">Browse  Structure  Insert</text>
          <text x="330" y="226">Browse  Structure  Insert</text>
          <text x="330" y="274">Browse  Structure  Insert</text>
          <text x="330" y="322">Browse  Structure  Insert</text>
        </g>

        <g fill="#171512">
          <text x="610" y="82">2</text>
          <text x="610" y="130">1</text>
          <text x="610" y="178">3</text>
          <text x="610" y="226">2</text>
          <text x="610" y="274">1</text>
          <text x="610" y="322">4</text>
          <text x="690" y="82">InnoDB</text>
          <text x="690" y="130">InnoDB</text>
          <text x="690" y="178">InnoDB</text>
          <text x="690" y="226">InnoDB</text>
          <text x="690" y="274">InnoDB</text>
          <text x="690" y="322">InnoDB</text>
          <text x="770" y="82">32 KiB</text>
          <text x="770" y="130">48 KiB</text>
          <text x="770" y="178">16 KiB</text>
          <text x="770" y="226">48 KiB</text>
          <text x="770" y="274">80 KiB</text>
          <text x="770" y="322">80 KiB</text>
        </g>
