          <text x="24" y="130">medical_certificates</text>
          <text x="24" y="178">medicines</text>
          <text x="24" y="226">patients</text>
          <text x="24" y="274">prescriptions</text>
          <text x="24" y="322">users</text>
        </g>

        <g fill="#005486">
