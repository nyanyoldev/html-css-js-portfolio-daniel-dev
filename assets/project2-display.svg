<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Database Management System project thumbnail</title>
  <desc id="desc">A stylized phpMyAdmin database dashboard for the CAIMS database tables.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#15140f"/>
      <stop offset="1" stop-color="#484d31"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f2ed"/>
      <stop offset="1" stop-color="#d8d6cf"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="24" dy="28" stdDeviation="0" flood-color="#000" flood-opacity=".34"/>
    </filter>
    <pattern id="grid" width="88" height="88" patternUnits="userSpaceOnUse">
      <path d="M88 0H0V88" fill="none" stroke="#f8f5ef" stroke-opacity=".08"/>
    </pattern>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>
  <rect width="1400" height="820" fill="url(#grid)"/>
  <circle cx="1120" cy="210" r="175" fill="#d6ddb1" opacity=".14"/>
  <circle cx="80" cy="680" r="155" fill="#d6ddb1" opacity=".10"/>

  <g filter="url(#shadow)">
    <rect x="92" y="102" width="1216" height="616" fill="url(#panel)" stroke="#c9c0ae" stroke-width="3"/>
    <rect x="92" y="102" width="1216" height="62" fill="#77776f"/>
    <rect x="92" y="164" width="250" height="554" fill="#dddcd7"/>
    <rect x="342" y="164" width="966" height="68" fill="#eceeec"/>

    <text x="376" y="142" fill="#ffffff" font-family="Consolas, monospace" font-size="24" font-weight="700">
      Server: 127.0.0.1  ›  Database: caims_db
    </text>

    <text x="128" y="150" fill="#f7f4ea" font-family="Arial, sans-serif" font-size="20" font-weight="700">local database</text>

    <text x="124" y="212" fill="#5e6b9f" font-family="Arial, sans-serif" font-size="42" font-style="italic" font-weight="800">php</text>
    <text x="190" y="212" fill="#eb8b1e" font-family="Arial, sans-serif" font-size="42" font-style="italic" font-weight="800">MyAdmin</text>

    <g font-family="Consolas, monospace" font-size="18">
